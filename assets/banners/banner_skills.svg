<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3b341"/>
      <stop offset="100%" style="stop-color:#d29922"/>
    </linearGradient>
  </defs>
  <rect width="900" height="140" fill="url(#bg4)" rx="10"/>
  <rect x="0" y="0" width="4" height="140" fill="url(#accent4)" rx="2"/>

  <!-- Wrench/tool icon -->
  <rect x="46" y="44" width="8" height="36" rx="3" fill="none" stroke="#e3b341" stroke-width="1.5" transform="rotate(-30 50 62)" opacity="0.8"/>
  <circle cx="56" cy="47" r="9" fill="none" stroke="#e3b341" stroke-width="1.5" opacity="0.6"/>
  <circle cx="56" cy="47" r="4" fill="#e3b341" opacity="0.4"/>

  <!-- Content -->
  <text x="96" y="42" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#e3b341" font-weight="600" letter-spacing="2">SKILLS &amp; TOOLS</text>
  <text x="96" y="70" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">Python · SQL · Power BI · Forecasting · Finance</text>
  <text x="96" y="96" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8b949e">Full analytics stack from raw data to executive dashboard — with financial engineering depth.</text>

  <!-- Skill category pills -->
  <rect x="96" y="110" width="110" height="20" rx="4" fill="#3776AB" opacity="0.25"/>
  <text x="151" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle" font-weight="600">PROGRAMMING</text>

  <rect x="216" y="110" width="80" height="20" rx="4" fill="#F2C811" opacity="0.2"/>
  <text x="256" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#e3b341" text-anchor="middle" font-weight="600">BI &amp; VIZ</text>

  <rect x="306" y="110" width="130" height="20" rx="4" fill="#2ea44f" opacity="0.15"/>
  <text x="371" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">STATS &amp; FINANCE</text>

  <rect x="446" y="110" width="110" height="20" rx="4" fill="#a371f7" opacity="0.15"/>
  <text x="501" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#c9a7ff" text-anchor="middle" font-weight="600">FORECASTING</text>

  <!-- Right deco: code symbols -->
  <text x="760" y="90" font-family="'Courier New',monospace" font-size="42" fill="#e3b341" opacity="0.06" font-weight="700">&lt;/&gt;</text>
</svg>
