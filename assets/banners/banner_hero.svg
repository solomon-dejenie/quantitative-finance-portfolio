<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea44f;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#2ea44f;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <rect width="900" height="200" fill="url(#grid)" rx="12" opacity="0.4"/>

  <!-- Glow orbs -->
  <circle cx="120" cy="100" r="80" fill="#2ea44f" opacity="0.04"/>
  <circle cx="780" cy="100" r="80" fill="#1f6feb" opacity="0.04"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#line)" rx="1"/>

  <!-- Globe icon (simplified) -->
  <circle cx="72" cy="100" r="28" fill="none" stroke="#2ea44f" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="72" cy="100" rx="14" ry="28" fill="none" stroke="#2ea44f" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="100" x2="100" y2="100" stroke="#2ea44f" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="72" x2="72" y2="128" stroke="#2ea44f" stroke-width="1" opacity="0.5"/>

  <!-- Status dot -->
  <circle cx="116" cy="68" r="5" fill="#2ea44f"/>
  <circle cx="116" cy="68" r="9" fill="#2ea44f" opacity="0.2"/>

  <!-- Main title -->
  <text x="140" y="88" font-family="'Segoe UI',system-ui,sans-serif" font-size="32" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">Open to Remote Work</text>

  <!-- Subtitle -->
  <text x="140" y="118" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" fill="#8b949e">Data Analyst · Econometrician · Financial Engineering Certified · 8+ Years CS Instructor</text>

  <!-- Tagline -->
  <text x="140" y="148" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#2ea44f" font-style="italic">Turning complex data into decisions that hold under pressure — available worldwide, remote-first.</text>

  <!-- Right side badges -->
  <rect x="610" y="162" width="130" height="22" rx="11" fill="#2ea44f" opacity="0.15"/>
  <text x="675" y="177" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#2ea44f" text-anchor="middle" font-weight="600">● AVAILABLE NOW</text>

  <!-- Bottom accent line -->
  <rect x="0" y="198" width="900" height="2" fill="url(#line)" rx="1"/>
</svg>
