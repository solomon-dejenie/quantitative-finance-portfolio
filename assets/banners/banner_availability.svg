<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea44f"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="900" height="140" fill="url(#bg6)" rx="10"/>
  <rect x="0" y="0" width="4" height="140" fill="url(#accent6)" rx="2"/>

  <!-- Globe with meridians -->
  <circle cx="60" cy="66" r="26" fill="none" stroke="#2ea44f" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="60" cy="66" rx="13" ry="26" fill="none" stroke="#2ea44f" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="66" x2="86" y2="66" stroke="#2ea44f" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="52" x2="86" y2="52" stroke="#2ea44f" stroke-width="0.5" opacity="0.25"/>
  <line x1="34" y1="80" x2="86" y2="80" stroke="#2ea44f" stroke-width="0.5" opacity="0.25"/>
  <!-- Location pin -->
