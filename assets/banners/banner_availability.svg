  <circle cx="116" cy="118" r="4" fill="#2ea44f"/>
  <text x="126" y="122" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#3fb950" font-weight="600">AVAILABLE NOW</text>

