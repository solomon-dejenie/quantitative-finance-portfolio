  <!-- Content -->
  <text x="106" y="42" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#3fb950" font-weight="600" letter-spacing="2">AVAILABILITY &amp; TIMEZONE</text>
  <text x="106" y="70" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">Remote-First · Immediate Start</text>
