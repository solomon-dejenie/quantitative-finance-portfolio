<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="50%" style="stop-color:#2ea44f"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
  </defs>
  <rect width="900" height="140" fill="url(#bg7)" rx="10"/>
  <rect x="0" y="0" width="4" height="140" fill="#1f6feb" rx="2"/>

  <!-- Envelope icon -->
  <rect x="36" y="48" width="48" height="34" rx="4" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
  <polyline points="36,48 60,70 84,48" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.7" stroke-linejoin="round"/>

  <!-- Content -->
  <text x="106" y="42" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#388bfd" font-weight="600" letter-spacing="2">HOW TO CONTACT / HIRE ME</text>
  <text x="106" y="70" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">Let's Build Something Rigorous Together</text>
  <text x="106" y="96" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8b949e">Email · LinkedIn · GitHub — response within 24 hours</text>

  <!-- Contact channel pills -->
  <rect x="106" y="110" width="76" height="20" rx="10" fill="#D44638" opacity="0.15"/>
  <text x="144" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#f78166" text-anchor="middle" font-weight="600">✉ EMAIL</text>

  <rect x="192" y="110" width="90" height="20" rx="10" fill="#0A66C2" opacity="0.2"/>
  <text x="237" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#388bfd" text-anchor="middle" font-weight="600">💼 LINKEDIN</text>

  <rect x="292" y="110" width="80" height="20" rx="10" fill="#f0f6fc" opacity="0.08"/>
  <text x="332" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" font-weight="600">🐙 GITHUB</text>

  <!-- Response time badge -->
  <rect x="390" y="110" width="130" height="20" rx="10" fill="#2ea44f" opacity="0.12"/>
  <text x="455" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">⚡ REPLY IN 24H</text>

  <!-- Right deco: signal waves -->
  <circle cx="800" cy="70" r="15" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.12"/>
  <circle cx="800" cy="70" r="28" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.08"/>
  <circle cx="800" cy="70" r="42" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.05"/>
  <circle cx="800" cy="70" r="7" fill="#1f6feb" opacity="0.25"/>
</svg>
