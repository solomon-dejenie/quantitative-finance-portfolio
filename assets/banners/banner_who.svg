<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
  </defs>
  <rect width="900" height="140" fill="url(#bg2)" rx="10"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="140" fill="url(#accent2)" rx="2"/>

  <!-- Person icon circle -->
  <circle cx="60" cy="60" r="22" fill="#1f6feb" opacity="0.15"/>
  <circle cx="60" cy="52" r="10" fill="none" stroke="#388bfd" stroke-width="1.5"/>
  <path d="M38 82 Q60 68 82 82" fill="none" stroke="#388bfd" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Section label -->
  <text x="96" y="46" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#388bfd" font-weight="600" letter-spacing="2">WHO I AM</text>
  <text x="96" y="75" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">Data Analyst · Econometrician · Educator</text>
  <text x="96" y="100" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8b949e">8+ years at the intersection of quantitative analysis, financial engineering, and teaching.</text>

  <!-- Stats row -->
  <rect x="96" y="112" width="90" height="20" rx="4" fill="#1f6feb" opacity="0.12"/>
  <text x="141" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#388bfd" text-anchor="middle" font-weight="600">8+ YRS EXPERIENCE</text>

  <rect x="196" y="112" width="110" height="20" rx="4" fill="#2ea44f" opacity="0.12"/>
  <text x="251" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#2ea44f" text-anchor="middle" font-weight="600">FINANCE CERTIFIED</text>

  <rect x="316" y="112" width="110" height="20" rx="4" fill="#a371f7" opacity="0.12"/>
  <text x="371" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#a371f7" text-anchor="middle" font-weight="600">200+ STUDENTS/YR</text>

  <!-- Right decorative element -->
  <text x="820" y="80" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" fill="#1f6feb" opacity="0.06" font-weight="700">{ }</text>
